<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>nav_flexbox</title>
    <style>
        *{
            margin: 0px;
            padding: 0px;

        }
    
        .logo{
          height: 63px;
            width:20vw;
            /* background-color: black; */
          border-radius: 50%;  
        }
        .logo img{
            height: auto;
            max-width: 135px;
        }
    nav{
        display: flex;
        justify-content: space-around;
        align-items: center;
        background-color: beige;
        /* border-radius: 9px; */
        position: sticky;
        top: 0px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    font-style: normal;
    font-weight: 400;
    font-display: swap;
    }
    .right ul{
        display: flex;
        gap: 20px;
        
    }
    .right ul li{
        list-style: none;
        display: flex;
        align-items: center;
        /* cursor: pointer; */
        cursor:pointer;
    }
    .right ul li span{
      padding: 0 2px;
    }
    </style>
    
</head>
<body>
    <header>
        <nav>
            <div class="logo">
                <img src="https://www.ultraedit.com/wp-content/uploads/2023/01/UE_Site-Logo.png" alt="ultraedit Logo">
            </div>
            <div class="right">
                <ul>
                    <li><span>Products </span> <svg   xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="18" height="18" color="currentColor" fill="none" stroke="#141B34" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M18 9.00005C18 9.00005 13.5811 15 12 15C10.4188 15 6 9 6 9" />
</svg> </li>
                    <li><span>Buy </span> </li>
                    <li><span>Support </span> <svg   xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="18" height="18" color="currentColor" fill="none" stroke="#141B34" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M18 9.00005C18 9.00005 13.5811 15 12 15C10.4188 15 6 9 6 9" />
</svg></li>
                    <li><span>Learn </span> <svg  xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="18" height="18" color="currentColor" fill="none" stroke="#141B34" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M18 9.00005C18 9.00005 13.5811 15 12 15C10.4188 15 6 9 6 9" />
</svg></li>
                    <li><span>Company </span> <svg   xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="18" height="18" color="currentColor" fill="none" stroke="#141B34" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M18 9.00005C18 9.00005 13.5811 15 12 15C10.4188 15 6 9 6 9" />
</svg></li>
                </ul>
            </div>
        </nav>
    </header>
</body>
</html>
